name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  moonbit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: moon version --all

      - name: Update dependencies
        run: moon update

      - name: Check
        run: moon check

      - name: Build
        run: moon build

      - name: Test
        run: moon test

      - name: CLI report smoke tests
        run: |
          moon run --target js cmd/main -- report fixtures/old.mbti fixtures/new.mbti
          moon run --target js cmd/main -- report fixtures/old.mbti fixtures/new.mbti --format json
          moon run --target js cmd/main -- report --config fixtures/moonguard-ci.conf

      - name: CLI directory smoke tests
        run: |
          moon run --target js cmd/main -- report-dir fixtures/dir-old fixtures/dir-new
          moon run --target js cmd/main -- report-dir --config fixtures/moonguard-ci.conf
          moon run --target js cmd/main -- check-dir fixtures/dir-old fixtures/dir-new --current 0.1.0 --next 1.0.0
          moon run --target js cmd/main -- check-dir --config fixtures/moonguard-ci.conf
          moon run --target js cmd/main -- inventory-dir fixtures/dir-new --format json
          moon run --target js cmd/main -- inventory-dir --config fixtures/moonguard-ci.conf
          # Scanning the repository root must ignore generated and fixture trees.
          moon run --target js cmd/main -- inventory-dir . --format json

      - name: CLI release-plan smoke tests
        run: |
          moon run --target js cmd/main -- release-plan fixtures/dir-old fixtures/dir-new --current 0.1.0 --next 1.0.0
          moon run --target js cmd/main -- release-plan fixtures/dir-old fixtures/dir-new --current 0.1.0 --next 1.0.0 --format json
          moon run --target js cmd/main -- release-plan --config fixtures/moonguard-ci.conf

      - name: Real-world interface corpus
        shell: pwsh
        run: |
          ./scripts/analyze-real-fixtures.ps1 -Json | Out-Null

      - name: Reproduce API evolution evidence
        shell: pwsh
        run: |
          ./scripts/generate-evolution-evidence.ps1 -Offline
          git diff --exit-code -- docs/evidence/generated fixtures/evolution/moonguard/v0.1.0.mbti

      - name: CLI check exit-code smoke tests
        run: |
          # moon run --target js can hide nonzero JS exits, so strict exit-code
          # assertions run the generated Node entry directly.
          node _build/js/debug/build/cmd/main/main.js check fixtures/old.mbti fixtures/new.mbti --current 0.1.0 --next 1.0.0
          node _build/js/debug/build/cmd/main/main.js check --config fixtures/moonguard-ci.conf
          node _build/js/debug/build/cmd/main/main.js check-dir fixtures/dir-old fixtures/dir-new --current 0.1.0 --next 1.0.0
          node _build/js/debug/build/cmd/main/main.js check-dir --config fixtures/moonguard-ci.conf
          node _build/js/debug/build/cmd/main/main.js release-plan fixtures/dir-old fixtures/dir-new --current 0.1.0 --next 1.0.0
          set +e
          node _build/js/debug/build/cmd/main/main.js check fixtures/old.mbti fixtures/new.mbti --current 0.1.0 --next 0.2.0
          file_status=$?
          node _build/js/debug/build/cmd/main/main.js check-dir fixtures/dir-old fixtures/dir-new --current 0.1.0 --next 0.2.0
          dir_status=$?
          node _build/js/debug/build/cmd/main/main.js release-plan fixtures/dir-old fixtures/dir-new --current 0.1.0 --next 0.2.0
          release_status=$?
          node _build/js/debug/build/cmd/main/main.js release-plan fixtures/dir-old fixtures/dir-duplicate --current 0.1.0 --next 1.0.0
          blocked_status=$?
          set -e
          if [ "$file_status" -eq 0 ]; then
            echo "expected direct Node file check command to fail for an insufficient major bump"
            exit 1
          fi
          if [ "$dir_status" -eq 0 ]; then
            echo "expected direct Node directory check command to fail for an insufficient major bump"
            exit 1
          fi
          if [ "$release_status" -ne 1 ]; then
            echo "expected direct Node release plan to exit 1 for an insufficient major bump, got $release_status"
            exit 1
          fi
          if [ "$blocked_status" -ne 2 ]; then
            echo "expected direct Node release plan to exit 2 for diagnostic errors, got $blocked_status"
            exit 1
          fi

      - name: Format check
        run: |
          moon fmt
          git diff --exit-code
